name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify E2E gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          required_checks=("CLI E2E" "Stripe E2E" "Polar E2E")

          for check_name in "${required_checks[@]}"; do
            conclusion=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs?per_page=100" --jq ".check_runs | map(select(.app.slug == \"github-actions\" and .name == \"${check_name}\")) | sort_by(.completed_at) | last | .conclusion // \"missing\"")

            if [ "$conclusion" != "success" ]; then
              echo "::error::Required E2E check '$check_name' is '$conclusion' for commit ${GITHUB_SHA}. Run the full E2E workflow on this exact SHA before releasing."
              exit 1
            fi
          done

          echo "Found successful CLI, Stripe, and Polar E2E checks for ${GITHUB_SHA}"

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: bun install

      - run: npx changelogithub
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: bun turbo build --filter=./packages/*

      - name: Determine npm tag
        id: npm_tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ -(alpha|beta|next|rc|canary) ]]; then
            NPM_TAG="${BASH_REMATCH[1]}"
          else
            git fetch origin main
            if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
              NPM_TAG="latest"
            else
              echo "::error::Stable releases must be on the main branch."
              exit 1
            fi
          fi
          echo "tag=$NPM_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing with npm tag: $NPM_TAG"

      - name: Publish to npm
        run: npm publish --workspaces --access public --no-git-checks --tag "${{ steps.npm_tag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
